<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeplay - Player</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/subpage.css">
    <link rel="stylesheet" href="/play.css">
    <link rel="preload" href="/Silkscreen-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <script src="/theme-init.js"></script>
    <script src="/utils.js" defer></script>
    <script src="/play.js" defer></script>
</head>
<body>
    <header>
        <a href="/" class="btn header-btn">Back to Library</a>
        <!-- [html-validate-disable-next empty-heading -- populated by play.js] -->
        <h1 class="game-name" id="game-name"></h1>
        <button type="button" id="theme-toggle" class="btn header-btn" title="Toggle light/dark mode" aria-label="Toggle light/dark mode"></button>
    </header>
    <main>
        <div id="game"></div>
        <div id="error" class="error-msg" role="alert" style="display:none;"></div>
    </main>
</body>
</html>
