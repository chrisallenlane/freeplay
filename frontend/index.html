<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeplay</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1><span aria-hidden="true">🕹️</span> Freeplay</h1>
        <button type="button" id="rescan-btn" title="Rescan ROMs and fetch cover art">Rescan &#8635;</button>
    </header>
    <a href="#game-grid" class="skip-link">Skip to games</a>
    <main>
        <div class="filters" id="filters"></div>
        <div class="search-bar">
            <label for="search" class="sr-only">Search games</label>
            <input type="text" id="search" placeholder="Search games...">
        </div>
        <div class="game-grid" id="game-grid"></div>
    </main>
    <script src="/utils.js"></script>
    <script src="/app.js"></script>
</body>
</html>
