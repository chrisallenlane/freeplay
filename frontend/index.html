<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeplay</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <link rel="preload" href="/Silkscreen-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <script src="/theme-init.js"></script>
    <script src="/utils.js" defer></script>
    <script src="/app.js" defer></script>
</head>
<body>
    <header>
        <h1><span aria-hidden="true">🕹️</span> Freeplay</h1>
        <div class="header-actions">
            <button type="button" id="theme-toggle" class="btn header-btn" title="Toggle light/dark mode" aria-label="Toggle light/dark mode"></button>
            <button type="button" id="rescan-btn" class="btn header-btn" title="Rescan ROMs and fetch cover art">Rescan &#8635;</button>
        </div>
    </header>
    <main>
        <div class="filters" id="filters" role="group" aria-label="Filter games"></div>
        <div class="search-bar">
            <label for="search" class="sr-only">Search games</label>
            <input type="text" id="search" placeholder="Search games..." autofocus>
        </div>
        <div class="game-grid" id="game-grid"></div>
    </main>
    <div id="rescan-status" role="status" aria-live="polite" class="sr-only"></div>
</body>
</html>
