<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeplay - Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3e;
            gap: 16px;
        }
        header a {
            color: #8888ff;
            text-decoration: none;
            font-size: 0.875rem;
        }
        header a:hover { text-decoration: underline; }
        header .game-name {
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
        }
        #game {
            flex: 1;
            min-height: 480px;
        }
        .error-msg {
            text-align: center;
            padding: 60px 24px;
            color: #ff6666;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">&larr; Back to Library</a>
        <span class="game-name" id="game-name"></span>
    </header>
    <div id="game"></div>
    <div id="error" class="error-msg" style="display:none;"></div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var consoleName = params.get('console');
            var rom = params.get('rom');

            if (!consoleName || !rom) {
                showError('Missing console or rom parameter.');
                return;
            }

            var nameEl = document.getElementById('game-name');
            var dot = rom.lastIndexOf('.');
            nameEl.textContent = dot > 0 ? rom.substring(0, dot) : rom;
            document.title = 'Freeplay - ' + nameEl.textContent;

            fetch('/api/games')
                .then(function(res) { return res.json(); })
                .then(function(catalog) {
                    var game = null;
                    for (var i = 0; i < catalog.games.length; i++) {
                        if (catalog.games[i].console === consoleName && catalog.games[i].filename === rom) {
                            game = catalog.games[i];
                            break;
                        }
                    }
                    if (!game) {
                        showError('Game not found. It may have been removed from the library.');
                        return;
                    }
                    startEmulator(game);
                })
                .catch(function() {
                    showError('Could not load game catalog.');
                });

            function showError(msg) {
                document.getElementById('game').style.display = 'none';
                var el = document.getElementById('error');
                el.style.display = '';
                el.textContent = msg;
            }

            function startEmulator(game) {
                window.EJS_player = '#game';
                window.EJS_core = game.core;
                window.EJS_gameUrl = '/roms/' + encodeURIComponent(consoleName) + '/' + encodeURIComponent(rom);
                window.EJS_pathtodata = '/emulatorjs/data/';
                window.EJS_color = '#1a1a2e';
                window.EJS_gameName = nameEl.textContent;

                if (game.hasBios) {
                    window.EJS_biosUrl = '/bios/' + encodeURIComponent(consoleName) + '/';
                }

                var script = document.createElement('script');
                script.src = '/emulatorjs/data/loader.js';
                document.body.appendChild(script);
            }
        })();
    </script>
</body>
</html>
