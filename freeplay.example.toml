# Freeplay configuration
port = 8080

# Cover art API (optional)
# Requires a Twitch developer application: https://dev.twitch.tv/console
# Format: "client_id:client_secret"
# cover_art_api = "igdb"
# cover_art_api_key = "your_client_id:your_client_secret"

# ROM directories
# Each entry maps a display name to a path and EmulatorJS core.
# Paths are relative to the data directory (/data in Docker).
#
# igdb_platform_ids improves cover art search accuracy (optional).
# Include regional variants (e.g. NES + Famicom) for best results.
# See: doc/igdb-platform-ids.md

